# Gen23 Experiment: Debris Ice Baseline with LR 0.0007 and Early Stopping
# Objective: Test a mid-point max_lr (0.0007) with the new early stopping.

training_opts:
  run_name: "gen23_dci_baseline_lr7e4_es20_md001"
  early_stopping: 20
  early_stopping_min_delta: 0.001
  # early_stopping: 20 (inherited from train.yaml)
  # early_stopping_min_delta: 0.001 (inherited from train.yaml)

loader_opts:
  # batch_size: 8 (inherited from train.yaml)
  # output_classes: [2] (inherited from train.yaml)
  # robust_scaling: false (inherited from train.yaml)

optim_opts:
  args:
    # lr: 0.0003 (inherited from train.yaml)

scheduler_opts:
  args:
    max_lr: 0.0007 # Mid-point max_lr

# Frodo 4: Full Physics + Strong Velocity Loss
training_opts:
  run_name: "gen_robust_iter8_dci_linear_vloss_strong"
  dataset_name: "gen_robust_comprehensive"

loader_opts:
  batch_size: 8
  landsat_channels: true
  dem_channels: true
  spectral_indices_channels: true
  hsv_channels: true
  physics_channels: true
  velocity_channels: true
  robust_scaling: false

loss_opts:
  use_velocity_loss: true
  velocity_loss_weight: 0.25
  velocity_high_speed_threshold: 3.16

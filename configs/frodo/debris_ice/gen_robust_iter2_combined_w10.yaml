training_opts:
  run_name: "gen_robust_iter2_combined_w10"
  dataset_name: "gen_robust_comprehensive"

loader_opts:
  velocity_channels: true
  physics_channels: ["tpi", "roughness", "plan_curvature"]

loss_opts:
  use_velocity_loss: true
  velocity_loss_weight: 1.0
  velocity_loss_warmup_epochs: 10
  velocity_loss_ramp_epochs: 10

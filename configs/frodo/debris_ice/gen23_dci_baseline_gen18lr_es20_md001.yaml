# Gen23 Experiment: Debris Ice Baseline with Gen18 LR and Early Stopping
# Objective: Test the higher max_lr (0.001) that showed promise in Gen18, with the new early stopping.

training_opts:
  run_name: "gen23_dci_baseline_gen18lr_es20_md001"
  early_stopping: 20
  early_stopping_min_delta: 0.001

# optim_opts:
#   args:
#     # lr: 0.0003 (inherited from train.yaml)

scheduler_opts:
  args:
    max_lr: 0.001 # Gen18 peak max_lr

# Gen12 Debris regression: velocity/physics with early stop and regression class weights.
# Goal: stabilize the regression variant by clipping late overfit and modest weighting.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen12_dci_phys_vel_regression_clip"
  epochs: 200
  test_eval_n: 3
  test_eval_baseline_epoch: 40
  test_eval_transition_epoch: 120
  early_stopping: 50

loader_opts:
  physics_channels: true
  velocity_channels: true

loss_opts:
  class_weights: [0, 1]

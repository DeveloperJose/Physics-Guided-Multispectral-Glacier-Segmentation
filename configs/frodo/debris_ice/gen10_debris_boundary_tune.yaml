# Gen10 Debris-Focused with Boundary Loss Parameter Tuning (Frodo RTX 2080 Ti)
# Goal: Improve debris boundary detection by tuning the theta0 and theta parameters of the custom boundary loss.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen10_debris_boundary_tune"

loader_opts:
  velocity_channels: true
  physics_channels: true

loss_opts:
  theta0: 5
  theta: 7
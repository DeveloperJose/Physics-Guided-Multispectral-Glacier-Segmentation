# Gen12 Debris: heavy all-channels with higher debris weight and tighter stopping.
# Goal: push debris recall/IoU beyond Gen11 while cutting off late-epoch overfitting.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen12_debris_weight4_earlystop"
  epochs: 220
  test_eval_n: 3
  early_stopping: 50  # stop sooner to avoid late drift seen in Gen11

loader_opts:
  physics_channels: true
  velocity_channels: true
  spectral_indices_channels: true
  hsv_channels: true

loss_opts:
  class_weights: [1, 4.0]

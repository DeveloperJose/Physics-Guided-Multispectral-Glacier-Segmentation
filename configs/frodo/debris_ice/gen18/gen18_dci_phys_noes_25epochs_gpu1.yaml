# Run for a fixed 25 epochs to analyze initial learning behavior without early stopping
training_opts:
  run_name: "gen18_dci_phys_noes_25epochs_gpu1"
  dataset_name: "bibek_w512_o64_f1_v2_phys64_s1_velocity"
  epochs: 25
  early_stopping: 999
loader_opts:
  physics_channels: true
optim_opts:
  args:
    lr: 0.0001
    weight_decay: 0.0001
scheduler_opts:
  args:
    max_lr: 0.0003

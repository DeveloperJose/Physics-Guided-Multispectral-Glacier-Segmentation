# Replicate of gen17's best physics-based model
training_opts:
  run_name: "gen18_dci_phys_lowlr_es10_gpu1"
  dataset_name: "bibek_w512_o64_f1_v2_phys64_s1_velocity"
  epochs: 120
  early_stopping: 10
loader_opts:
  physics_channels: true
optim_opts:
  args:
    lr: 0.0001
    weight_decay: 0.0001
scheduler_opts:
  args:
    max_lr: 0.0006

# Frodo 3: SOTA Baseline + Selected "Good" Physics (Velocity + Flow Acc)
training_opts:
  run_name: "gen_robust_iter8_dci_refined_selection"
  dataset_name: "gen_robust_comprehensive"

loader_opts:
  batch_size: 8
  landsat_channels: true
  dem_channels: true
  spectral_indices_channels: true
  hsv_channels: true
  # Only keeping the strongest physics signals
  physics_channels: ["flow_accumulation"]
  velocity_channels: true
  robust_scaling: false

loss_opts:
  use_velocity_loss: true
  velocity_loss_weight: 0.05

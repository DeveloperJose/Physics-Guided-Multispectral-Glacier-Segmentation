# Gen11 Debris heavy all-channels with moderate debris weighting.
# Goal: Explore debris gains from class weights without the Gen10 over-weighting collapse.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen11_debris_heavy_weight3"
  epochs: 300
  test_eval_n: 3

loader_opts:
  physics_channels: true
  velocity_channels: true

loss_opts:
  class_weights: [1, 3.0]

# Gen13 Clean Ice BASE (best CI: Gen3 w256).
# No physics or velocity; keep early stopping to curb late overfit.

training_opts:
  dataset_name: bibek_w256_o64_f1_v2
  run_name: gen13_ci_base
  epochs: 180
  test_eval_n: 3
  early_stopping: 50

loader_opts:
  physics_channels: false
  velocity_channels: false

# Gen9 Window Size 256 + Velocity Clean Ice Model (Frodo RTX 2080 Ti)
# Hypothesis: w256 showed best clean ice performance (0.731 IoU) 
# + velocity channels could push >0.75 IoU

training_opts:
  dataset_name: "bibek_w256_o64_f1_comprehensive_phys64_s1"
  run_name: "gen9_w256_velocity_clean"

loader_opts:
  # Keep defaults from train.yaml + enable velocity
  velocity_channels: true
  # Others inherit as true from train.yaml baseline
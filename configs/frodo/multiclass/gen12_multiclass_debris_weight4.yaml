# Gen12 Multiclass: debris-upweighted and early stop to reduce CI drift.
# Goal: lift debris IoU without hurting CI/BG by stopping before late overfit.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen12_multiclass_debris_weight4"
  epochs: 200
  test_eval_n: 3
  early_stopping: 50

loader_opts:
  physics_channels: true
  velocity_channels: true
  spectral_indices_channels: true
  hsv_channels: true

loss_opts:
  class_weights: [1, 1.0, 4.0]
  label_smoothing: 0.03

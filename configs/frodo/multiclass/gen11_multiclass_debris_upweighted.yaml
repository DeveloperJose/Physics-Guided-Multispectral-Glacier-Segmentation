# Gen11 Multiclass with debris-upweighted loss and physics/velocity channels.
# Goal: Prevent debris collapse seen in Gen9/Gen10 while keeping CI/BG quality.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen11_multiclass_debris_upweighted"
  epochs: 200
  test_eval_n: 3

loader_opts:
  physics_channels: true
  velocity_channels: true
  spectral_indices_channels: true
  hsv_channels: true

loss_opts:
  class_weights: [1, 1.0, 3.0]
  label_smoothing: 0.05

# Gen7 Validation: Best Debris Performer (based on Gen5 multi_physics_velocity_gen5)
# Tests physics + velocity channels with comprehensive dataset and debris bug fix
# Gen5 achieved debris IoU ~0.42 with this configuration

training_opts:
  dataset_name: "bibek_w256_o64_f1_comprehensive_phys64_s1"
  run_name: "gen7_validation_physics_velocity"
  epochs: 150
  early_stopping: 75
  test_eval_baseline_epoch: 15
  test_eval_aggressive_threshold: 0.05
  test_eval_transition_epoch: 50

loader_opts:
  physics_channels: true
  velocity_channels: true
  # Other settings inherit from train.yaml defaults
  
loss_opts:
  use_velocity_loss: false  # CRITICAL: Disabled for Gen7
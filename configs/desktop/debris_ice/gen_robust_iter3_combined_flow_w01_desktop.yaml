training_opts:
  run_name: "gen_robust_iter3_combined_flow_w01_desktop"
  dataset_name: "gen_robust_comprehensive"

loader_opts:
  velocity_channels: true
  physics_channels: ["flow_accumulation", "tpi", "roughness", "plan_curvature"]
  # batch_size inherits desktop default (8) to fit GPU memory

loss_opts:
  use_velocity_loss: true
  velocity_loss_weight: 0.1
  velocity_loss_warmup_epochs: 5
  velocity_loss_ramp_epochs: 10

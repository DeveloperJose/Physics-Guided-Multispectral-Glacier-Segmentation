training_opts:
  epochs: 200
  early_stopping: 15
  early_stopping_min_delta: 0.001
  mlflow_experiment_name: reproducibility
  experiment_prefix: reproducibility
  val_viz_n: 4
  val_viz_every_n_epochs: 0
  run_test_eval: true
  test_eval_n: 4
  deterministic: true
  seed: 2026
  run_name: reproducibility_dci_followup_full_threshold_1p5_seed2026
loader_opts:
  landsat_channels: true
  dem_channels: true
  spectral_indices_channels: true
  hsv_channels: true
  physics_channels: true
  velocity_channels: true
  output_classes:
  - 2
  robust_scaling: false
scheduler_opts:
  args:
    max_lr: 0.0005
loss_opts:
  use_velocity_loss: true
  velocity_high_speed_threshold: 1.5

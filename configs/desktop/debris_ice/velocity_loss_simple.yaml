training_opts:
  dataset_name: "bibek_w256_o64_f1_comprehensive_phys64_s1"
  run_name: "velocity_loss_simple"
  epochs: 40

loader_opts:
  velocity_channels: true
  physics_channels: false

loss_opts:
  use_velocity_loss: true
  velocity_confidence_threshold: 0.6
  velocity_low_speed_threshold: 0.35
  velocity_high_speed_threshold: 1.0
  velocity_loss_weight: 0.02
  velocity_loss_warmup_epochs: 0
  velocity_loss_ramp_epochs: 0
  velocity_loss_clip: 1.0

training_opts:
  dataset_name: "gen_robust_comprehensive_dci_clean_v2"
  run_name: "sota_dci_19_01_speed_bs12_w8_persist_prefetch4"
  seed: 8675309
  augmentation_seed: 1000
  deterministic: true
  epochs: 8
  early_stopping: 0
  run_test_eval: false
  test_eval_n: 0
  lr_monitor: false
  check_val_every_n_epoch: 1

profiling_opts:
  enabled: true
  mode: "simple"

loader_opts:
  processed_dir: "/home/devj/local-arch/data/HKH/gen_robust_comprehensive_dci_clean_v2/"
  batch_size: 12
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  landsat_channels: true
  dem_channels: true
  spectral_indices_channels: true
  hsv_channels: false
  velocity_channels: true
  physics_channels: true
  robust_scaling: false

loss_opts:
  use_velocity_loss: true
  velocity_loss_weight: 0.20
  velocity_high_speed_threshold: 3.16
  velocity_loss_warmup_epochs: 10
  velocity_loss_ramp_epochs: 10

model_opts:
  framework: "smp"
  name: "Unet"
  sigma_init: 0.5
  min_log_var: -3.0
  max_log_var: 2.0
  args:
    encoder_name: "resnet18"
    encoder_weights: null

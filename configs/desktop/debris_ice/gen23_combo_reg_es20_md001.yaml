# Gen23 Experiment: Combined Regularization (Dropout + Weight Decay) with Early Stopping
# Objective: Re-evaluate the combination of dropout (0.3) and weight decay (1e-3) with the new early stopping.

training_opts:
  run_name: "gen23_combo_reg_es20_md001"
  early_stopping: 20
  early_stopping_min_delta: 0.001
  # early_stopping: 20 (inherited from train.yaml)
  # early_stopping_min_delta: 0.001 (inherited from train.yaml)

loader_opts:
  {} # inherit defaults

model_opts:
  args:
    dropout: 0.3

optim_opts:
  args:
    # lr: 0.0003 (inherited from train.yaml)
    weight_decay: 1e-3

scheduler_opts:
  args:
    max_lr: 0.0005 # Current baseline max_lr

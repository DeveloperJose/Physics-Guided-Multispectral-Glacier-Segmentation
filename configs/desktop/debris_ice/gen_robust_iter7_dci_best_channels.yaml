# Desktop Data-Driven: Use only the best channels identified from analysis.
training_opts:
  run_name: "gen_robust_iter7_dci_best_channels"
  epochs: 200
  early_stopping: 75
  test_eval_aggressive_threshold: 0.0
  dataset_name: "gen_robust_comprehensive"

loader_opts:
  batch_size: 8
  landsat_channels: true
  dem_channels: ["slope_deg"]
  spectral_indices_channels: false
  hsv_channels: false
  physics_channels: ["flow_accumulation"]
  velocity_channels: ["velocity"]
  robust_scaling: false

# Velocity Loss Experiment
# This config enables velocity channels which triggers the Physics-Informed Velocity Loss.

training_opts:
  dataset_name: "bibek_w256_o64_f1_comprehensive_phys64_s1"
  run_name: "velocity_loss_v1"
  test_eval_baseline_epoch: 10 # Single baseline evaluation at this epoch
  test_eval_aggressive_threshold: 0.15 # 15% improvement threshold during phase 2 (reduced frequency)
  test_eval_transition_epoch: 100 # Switch from phase 2 to phase 3 at this epoch

loader_opts:
  # Enable Velocity channels to trigger the Physics Loss in the model
  velocity_channels: true

  # Disable other physics channels to isolate the effect
  physics_channels: false

  seed: 42
  run_name: reproducibility2_dci_17_full_threshold_10p0_seed42
loader_opts:
  landsat_channels: true
  dem_channels: true
  spectral_indices_channels: true
  hsv_channels: true
  physics_channels: true
  velocity_channels: true
  robust_scaling: false
  output_classes:
  - 2
scheduler_opts:

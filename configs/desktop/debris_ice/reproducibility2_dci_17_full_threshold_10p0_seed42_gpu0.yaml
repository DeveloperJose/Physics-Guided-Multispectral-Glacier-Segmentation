training_opts:
  epochs: 300
  early_stopping: 35
  early_stopping_min_delta: 0.001
  mlflow_experiment_name: reproducibility2
  experiment_prefix: reproducibility2
  val_viz_n: 0
  val_viz_every_n_epochs: 0
  run_test_eval: false
  test_eval_n: 0

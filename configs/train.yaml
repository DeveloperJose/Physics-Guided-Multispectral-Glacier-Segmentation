# Global training configuration - base for all experiments
# This is the top-level config file that all experiment configs inherit from.
# Override any parameter in child configs for experiment-specific settings.

training_opts:
  dataset_name: "gen_robust_comprehensive_dci_clean_v2" # Default run name (override in experiment configs)
  run_name: "" # Optional run identifier (appended to dataset_name)
  mlflow_experiment_name: "sota_replication" # Put all publication reruns in one MLflow experiment
  mlflow_artifacts_enabled: false # Keep MLflow scalar metrics on, but skip artifact uploads during training
  # experiment_prefix: "reproducibility" # Legacy fallback when mlflow_experiment_name is unset
  seed: 8675309 # Global random seed for Python, NumPy, PyTorch, and dataloader workers
  augmentation_seed: 1000 # Seed for albumentations augmentations (independent from model seed)
  deterministic: true # Prefer deterministic CUDA kernels when available
  epochs: 200 # Reduced from 500 based on Gen1/Gen2 analysis (best models converge at 130-140)
  fine_tune: false
  find_lr: false
  early_stopping: 55 # Allow longer convergence; was 15 for sweeps
  early_stopping_min_delta: 0.001
  # Validation visualizations (periodic, every N epochs)
  val_viz_n: 0 # Number per third (top, middle, bottom). 0=disable for routine sweeps
  val_viz_every_n_epochs: 0
  val_viz_selection: "iou" # Selection method: "iou" or "random"
  # Test evaluation (on best model only)
  run_test_eval: false # Full test evaluation is reserved for selected final models
  test_eval_n: 0 # Number per third for visualization. 0=disable for routine sweeps
  viz_scale_factor: 1 # Scale factor for visualization panels (0.5=256x256, 1.0=full resolution)

loader_opts:
  batch_size: 8 # CRITICAL: Locked to 8 for stability (prevents OOM/LR mismatch)

  # Channel groups are resolved by name from band_metadata.json.
  landsat_channels: true # Landsat B1-B7
  dem_channels: true # elevation, slope
  spectral_indices_channels: false # NDVI, NDWI, NDSI
  hsv_channels: false # H, S, V
  velocity_channels: false # velocity, vx, vy, mask
  physics_channels: false # flow_accumulation, tpi, roughness, plan_curvature

  # Fine-grained channel selection examples (use in experiment configs):
  # landsat_channels: [0, 1, 2]                    # Group-local indices (B1, B2, B3)
  # landsat_channels: ["B1", "B2", "B3"]           # By name
  # spectral_indices_channels: ["NDVI", "NDSI"]    # Subset of indices
  # velocity_channels: ["velocity"]                # Auto-adds velocity_mask
  # velocity_channels: false                       # Disable velocity entirely

  output_classes: [2] # Binary segmentation: [1]=CleanIce, [2]=Debris, [1,2]=Multiclass
  normalize: "mean-std" # "min-max" or "mean-std"
  robust_scaling: false # Use log/symlog for physics channels. Set false for linear scaling.
  class_names: ["BG", "CleanIce", "Debris"]

  # Data Augmentation (restored from Gen3)
  augmentations:
    h_flip_prob: 0.15
    v_flip_prob: 0.15
    rotate90_prob: 0.15
    transpose_prob: 0.15

metrics_opts:
  metrics: ["IoU", "precision", "recall"]
  threshold: [0.5, 0.5] # Per-class thresholds for binary classification

loss_opts:
  name: "custom"
  label_smoothing: 0
  class_weights: [0, 1] # Default for binary: ignore background (0), focus on foreground (1)

  # Physics-Informed Velocity Loss Options
  use_velocity_loss: false
  velocity_high_speed_threshold: 3.16 # m/yr (Background 75th percentile)
  velocity_loss_weight: 0.05
  velocity_loss_warmup_epochs: 10
  velocity_loss_ramp_epochs: 10
  velocity_loss_clip: null # Sigmoid loss is naturally bounded [0,1]

model_opts: {}

optim_opts:
  name: "AdamW"
  args:
    lr: 0.0003
    weight_decay: 5e-5

scheduler_opts:
  name: "OneCycleLR"
  args:
    max_lr: 0.0005 # Peak LR (1.67x base lr; 0.001 used in sweeps)
    pct_start: 0.3 # 30% warmup, 70% annealing
    anneal_strategy: "cos"

# Multi-class segmentation (BG + CleanIce + Debris) task defaults
loader_opts:
  output_classes: [0, 1, 2]  # All three classes
  target_class_ids: [1, 2]  # Critical fix for multi-class loss
metrics_opts:
  threshold: [0.5, 0.5, 0.5]  # BG, CleanIce, Debris
loss_opts:
  class_weights: [0, 1, 1]  # Default for multi-class: ignore background (0), focus on foreground classes (1, 2)

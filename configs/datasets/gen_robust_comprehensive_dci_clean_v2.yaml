# Clean v2 DCI dataset.
# Uses source-valid Landsat masking before auxiliary channels are appended and
# pixel-weighted normalization over generated model-visible train pixels.
output_name: "gen_robust_comprehensive_dci_clean_v2"

# Preprocessing parameters
window_size: [512, 512]
overlap: 64
filter: 0.1
test: 0.2
val: 0.1

# Auxiliary products to make available in the generated dataset. Publication
# experiments should still select channel groups explicitly by name.
add_velocity: true
velocity_clip_m_per_year: 1000.0
add_ndvi: true
add_ndwi: true
add_ndsi: true
add_hsv: true
physics_res: 8
physics_scale: 1.0
save_skipped_visualizations: false

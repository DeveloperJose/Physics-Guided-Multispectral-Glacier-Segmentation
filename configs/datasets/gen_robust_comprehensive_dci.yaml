# Comprehensive dataset with max DCI coverage
# Same channels as gen_robust_comprehensive.
# Uses per-class filtering: keeps ALL slices with any DCI pixels,
# while CI-only slices still require 10% glacier coverage threshold.
output_name: "gen_robust_comprehensive_dci"

# Preprocessing parameters
window_size: [512, 512]
overlap: 64
filter: 0.1
test: 0.2
val: 0.1

# Enable all features
add_velocity: true
add_ndvi: true
add_ndwi: true
add_ndsi: true
add_hsv: true
physics_res: 8
physics_scale: 1.0
save_skipped_visualizations: false

# Comprehensive v3 dataset.
# Preprocess writes normalized split-level arrays:
#   split/X.npy: [N, C, H, W] float32
#   split/y.npy: [N, H, W] uint8
output_name: "comprehensive_v3"

window_size: [512, 512]
overlap: 64
filter: 0.1
test: 0.2
val: 0.1

add_velocity: true
velocity_clip_m_per_year: 1000.0
add_ndvi: true
add_ndwi: true
add_ndsi: true
add_hsv: true
physics_res: 8
physics_scale: 1.0
save_skipped_visualizations: false

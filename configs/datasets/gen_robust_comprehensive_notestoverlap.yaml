# Comprehensive dataset — test set has no overlap (clean metrics)
# Same channels as gen_robust_comprehensive, but preprocess.py
# forces overlap=0 for the test split at runtime.
output_name: "gen_robust_comprehensive_notestoverlap"

# Preprocessing parameters
window_size: [512, 512]
overlap: 64
filter: 0.1
test: 0.2
val: 0.1

# Enable all features
add_velocity: true
add_ndvi: true
add_ndwi: true
add_ndsi: true
add_hsv: true
physics_res: 8
physics_scale: 1.0
save_skipped_visualizations: false

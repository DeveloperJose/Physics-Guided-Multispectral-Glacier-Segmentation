# Comprehensive dataset for Gen Robust experiments
# Contains ALL channels: RGB, DEM, Velocity, Physics (v4), Indices, HSV.
# Allows channel selection at runtime in training configs.
output_name: "gen_robust_comprehensive"

# Preprocessing parameters
window_size: [512, 512]
overlap: 64
filter: 0.1
test: 0.2
val: 0.1

# Enable all features
add_velocity: true
add_ndvi: true
add_ndwi: true
add_ndsi: true
add_hsv: true
physics_res: 64
physics_scale: 1.0
save_skipped_visualizations: false

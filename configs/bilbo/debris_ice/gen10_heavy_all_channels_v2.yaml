# Gen10 Heavy All-Channels Debris Model (Bilbo RTX 4090)
# Maximum debris IoU test using all available channels with proven hyperparameters
# Based on experimental evidence from 15 successful debris detection runs

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen10_heavy_all_channels_debris"
  epochs: 300

loader_opts:
  # Enable ALL available channels for maximum feature diversity
  landsat_channels: true      # [0-7] Landsat B1-B7
  dem_channels: true          # [8-9] elevation, slope  
  spectral_indices_channels: true # [10-12] NDVI, NDWI, NDSI
  hsv_channels: true          # [13-15] H, S, V
  velocity_channels: true     # [16-19] velocity, vx, vy, mask
  physics_channels: true      # [20-23] flow, TPI, roughness, curvature
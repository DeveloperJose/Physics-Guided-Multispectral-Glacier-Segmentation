# Gen13 Debris advanced (Bilbo GPU1).
# Physics + velocity, heavier class weight, light smoothing, tighter stopping.

training_opts:
  dataset_name: bibek_w512_o64_f1_v2_phys64_s1_velocity
  run_name: gen13_dci_bilbo_advanced
  epochs: 220
  test_eval_n: 3
  early_stopping: 45

loader_opts:
  batch_size: 24
  physics_channels: true
  velocity_channels: true

loss_opts:
  class_weights: [1, 4.0]
  label_smoothing: 0.02

optim_opts:
  args:
    weight_decay: 0.0001

# Debris Ice Physics+Velocity with batch size 32
training_opts:
  run_name: "gen18_dci_phys_vel_lowlr_bs32_gpu1"
  dataset_name: "bibek_w512_o64_f1_v2_phys64_s1_velocity"
  epochs: 120
  early_stopping: 10
loader_opts:
  batch_size: 32
  physics_channels: true
  velocity_channels: true
optim_opts:

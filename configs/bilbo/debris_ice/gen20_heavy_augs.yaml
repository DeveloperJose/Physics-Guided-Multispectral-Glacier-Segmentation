# Gen20 Variation: Heavy Augmentations
# Goal: Combine class weight fix with heavy augmentations.
training_opts:
  run_name: "gen20_heavy_augs"
loss_opts:
  class_weights: [0.01, 1]
loader_opts:
  batch_size: 16
  augmentations:
    h_flip_prob: 0.8
    v_flip_prob: 0.8
    rotate_prob: 0.8
    rotate_limit: 90

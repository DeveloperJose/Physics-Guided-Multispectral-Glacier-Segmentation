# Gen9 Physics-Only Debris Model (Bilbo RTX 4090)
# Hypothesis: Physics features (flow accumulation, TPI, roughness, curvature) 
# are highly discriminative for debris-covered ice detection

training_opts:
  dataset_name: "bibek_w256_o64_f1_comprehensive_phys64_s1"
  run_name: "gen9_physics_only_debris"

loader_opts:
  # Enable physics channels only
  physics_channels: true
  # Disable all other channel groups
  landsat_channels: false
  dem_channels: false
  spectral_indices_channels: false
  hsv_channels: false
  velocity_channels: false

loss_opts:
  label_smoothing: 0.1
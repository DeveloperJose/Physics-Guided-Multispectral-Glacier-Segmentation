# Gen12 Bilbo: heavy all-channels debris with higher weight and stricter stopping.
# Goal: retain Bilbo's Gen11 lead while halting before val loss reversal.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen12_heavy_all_channels_earlystop"
  epochs: 220
  test_eval_n: 3
  early_stopping: 45

loader_opts:
  physics_channels: true
  velocity_channels: true

loss_opts:
  class_weights: [1, 4.0]

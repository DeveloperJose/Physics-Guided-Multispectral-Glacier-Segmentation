# Gen12 Bilbo: heavy all-channels debris with batch 16 for GPU fit.
# Goal: mirror the heavy configuration at lower batch size to test stability and fit.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen12_heavy_all_channels_bs16"
  epochs: 220
  test_eval_n: 3
  early_stopping: 45

loader_opts:
  batch_size: 16
  physics_channels: true
  velocity_channels: true

loss_opts:
  class_weights: [1, 4.0]

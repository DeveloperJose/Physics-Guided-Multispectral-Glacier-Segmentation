# Gen11 Bilbo heavy all-channels debris with moderate weighting (GPU=1 at launch).
# Goal: Follow up the promising Gen10 heavy run with balanced class weights.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen11_heavy_all_channels_debris"
  epochs: 300
  test_eval_n: 3

loader_opts:
  physics_channels: true
  velocity_channels: true

loss_opts:
  class_weights: [1, 3.0]

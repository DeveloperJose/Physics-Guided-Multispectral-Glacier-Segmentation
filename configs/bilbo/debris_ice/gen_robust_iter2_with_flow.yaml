training_opts:
  run_name: "gen_robust_iter2_with_flow"
  dataset_name: "gen_robust_comprehensive"

loader_opts:
  batch_size: 16
  velocity_channels: true
  physics_channels: ["flow_accumulation", "tpi", "roughness", "plan_curvature"]

loss_opts:
  use_velocity_loss: true
  velocity_loss_weight: 0.5
  velocity_loss_warmup_epochs: 10
  velocity_loss_ramp_epochs: 10

# Bilbo 1: Low Velocity Threshold (Forces guidance even in slow debris)
training_opts:
  run_name: "gen_robust_iter8_dci_vloss_thresh_1"
  dataset_name: "gen_robust_comprehensive"

loader_opts:
  batch_size: 8
  landsat_channels: true
  dem_channels: true
  spectral_indices_channels: true
  hsv_channels: true
  physics_channels: true
  velocity_channels: true
  robust_scaling: false

loss_opts:
  use_velocity_loss: true
  velocity_loss_weight: 0.05
  velocity_high_speed_threshold: 1.0

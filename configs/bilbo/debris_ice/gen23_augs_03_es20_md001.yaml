# Gen23 Experiment: Increased Augmentations 0.3 with Early Stopping
# Objective: Re-evaluate increased augmentations (0.3) with the new early stopping.

training_opts:
  run_name: "gen23_augs_03_es20_md001"
  early_stopping: 20
  early_stopping_min_delta: 0.001

loader_opts:
  augmentations:
    h_flip_prob: 0.3
    v_flip_prob: 0.3
    rotate90_prob: 0.3
    transpose_prob: 0.3

# optim_opts:
#   args:
#     # lr: 0.0003 (inherited from train.yaml)

scheduler_opts:
  args:
    max_lr: 0.0005 # Current baseline max_lr

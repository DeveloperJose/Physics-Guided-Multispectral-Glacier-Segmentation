# Gen11 Bilbo contrast run: physics + velocity only, reduced batch for 10GB GPU0.
# Purpose: isolate value of extra channels vs. the heavy all-channel run on GPU1.

training_opts:
  dataset_name: "bibek_w512_o64_f1_comprehensive_phys64_s1"
  run_name: "gen11_phys_vel_only_bs16"
  epochs: 250
  test_eval_n: 3

loader_opts:
  batch_size: 16
  physics_channels: true
  velocity_channels: true
  landsat_channels: false
  dem_channels: false
  spectral_indices_channels: false
  hsv_channels: false

loss_opts:
  class_weights: [1, 3.0]

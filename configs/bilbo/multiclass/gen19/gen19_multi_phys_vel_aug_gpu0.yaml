# Gen19 Multiclass with Physics, Velocity, and Augmentations (GPU 0)
training_opts:
  run_name: "gen19_multi_phys_vel_aug_gpu0"
  dataset_name: "bibek_w512_o64_f1_v2_phys64_s1_velocity"
  epochs: 150
  early_stopping: 20
loader_opts:
  batch_size: 16
  velocity_channels: true
  physics_channels: true
  augmentations:
    h_flip_prob: 0.5
    v_flip_prob: 0.5
    rotate_prob: 0.5
    rotate_limit: 45
model_opts:
  args:
    dropout: 0.2
loss_opts:
  label_smoothing: 0.1
optim_opts:
  args:
    lr: 0.0002
    weight_decay: 0.0001
scheduler_opts:
  name: "ReduceLROnPlateau"
  args:
    factor: 0.1
    patience: 5
